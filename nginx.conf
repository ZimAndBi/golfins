user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

  # Upstream services
  upstream frontend {
    server frontend:3000;
  }

  upstream auth_service {
    server auth-service:8000;
  }

  upstream policy_service {
    server policy-service:8000;
  }

  upstream premium_engine {
    server premium-engine:8000;
  }

  upstream claims_service {
    server claims-service:8000;
  }

  upstream document_service {
    server document-service:8000;
  }

  upstream notification_service {
    server notification-service:8000;
  }

  # Main server block
  server {
    listen 80;
    server_name _;

    # Frontend (root)
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # API routing — strip trailing slash so FastAPI doesn't 307 redirect
    location /api/auth {
      rewrite ^/api/auth/?$         /api/v1/auth        break;
      rewrite ^/api/auth/(.+)$      /api/v1/auth/$1     break;
      proxy_pass http://auth_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/policies {
      rewrite ^/api/policies/?$     /api/v1/policies    break;
      rewrite ^/api/policies/(.+)$  /api/v1/policies/$1 break;
      proxy_pass http://policy_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/products {
      rewrite ^/api/products/?$     /api/v1/products    break;
      rewrite ^/api/products/(.+)$  /api/v1/products/$1 break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/quotes {
      rewrite ^/api/quotes/?$       /api/v1/quotes      break;
      rewrite ^/api/quotes/(.+)$    /api/v1/quotes/$1   break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/claims {
      rewrite ^/api/claims/?$       /api/v1/claims      break;
      rewrite ^/api/claims/(.+)$    /api/v1/claims/$1   break;
      proxy_pass http://claims_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/equipment {
      rewrite ^/api/equipment/?$     /api/v1/equipment    break;
      rewrite ^/api/equipment/(.+)$  /api/v1/equipment/$1 break;
      proxy_pass http://policy_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/payments {
      proxy_pass http://policy_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/documents {
      rewrite ^/api/documents/?$    /api/v1/documents    break;
      rewrite ^/api/documents/(.+)$ /api/v1/documents/$1 break;
      proxy_pass http://document_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin: premium config (products, plans, rules, coverages)
    location /api/admin/premium {
      rewrite ^/api/admin/premium/?$     /api/v1/admin/premium/stats   break;
      rewrite ^/api/admin/premium/(.+)$  /api/v1/admin/premium/$1     break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/products {
      rewrite ^/api/admin/products/?$     /api/v1/admin/products    break;
      rewrite ^/api/admin/products/(.+)$  /api/v1/admin/products/$1 break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/plans {
      rewrite ^/api/admin/plans/?$     /api/v1/admin/plans    break;
      rewrite ^/api/admin/plans/(.+)$  /api/v1/admin/plans/$1 break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/coverages {
      rewrite ^/api/admin/coverages/?$     /api/v1/admin/coverages    break;
      rewrite ^/api/admin/coverages/(.+)$  /api/v1/admin/coverages/$1 break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/rules {
      rewrite ^/api/admin/rules/?$     /api/v1/admin/rules    break;
      rewrite ^/api/admin/rules/(.+)$  /api/v1/admin/rules/$1 break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/plan-coverages {
      rewrite ^/api/admin/plan-coverages/?$     /api/v1/admin/plan-coverages    break;
      rewrite ^/api/admin/plan-coverages/(.+)$  /api/v1/admin/plan-coverages/$1 break;
      proxy_pass http://premium_engine;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/claims {
      rewrite ^/api/admin/claims/?$     /api/v1/admin/claims/stats    break;
      rewrite ^/api/admin/claims/(.+)$  /api/v1/admin/claims/$1       break;
      proxy_pass http://claims_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin/policies {
      rewrite ^/api/admin/policies/?$    /api/v1/admin/policies/stats   break;
      rewrite ^/api/admin/policies/(.+)$ /api/v1/admin/policies/$1      break;
      proxy_pass http://policy_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/admin {
      rewrite ^/api/admin/?$         /api/v1/auth/admin/stats      break;
      rewrite ^/api/admin/users(.*)$ /api/v1/auth/admin/users$1    break;
      rewrite ^/api/admin/(.+)$      /api/v1/auth/admin/$1         break;
      proxy_pass http://auth_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/notifications {
      rewrite ^/api/notifications/?$    /api/v1/notifications    break;
      rewrite ^/api/notifications/(.+)$ /api/v1/notifications/$1 break;
      proxy_pass http://notification_service;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
      access_log off;
      return 200 "healthy\n";
      add_header Content-Type text/plain;
    }
  }
}
