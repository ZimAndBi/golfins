version: '3.8'

services:
  # ======== DATABASES ========
  postgres:
    image: postgres:15-alpine
    container_name: golfins-postgres
    environment:
      POSTGRES_DB: golfins
      POSTGRES_USER: golfins_user
      POSTGRES_PASSWORD: golfins_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golfins_user -d golfins"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - golfins-network

  redis:
    image: redis:7-alpine
    container_name: golfins-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - golfins-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: golfins-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - golfins-network

  minio:
    image: minio/minio:latest
    container_name: golfins-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - golfins-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: golfins-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - golfins-network

  # ======== BACKEND SERVICES ========
  auth-service:
    build: ./services/auth-service
    container_name: golfins-auth-service
    ports:
      - "8001:8000"
    volumes:
      - ./services/auth-service:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://golfins_user:golfins_pass@postgres:5432/golfins
      REDIS_URL: redis://redis:6379/0
      SERVICE_NAME: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - golfins-network
    restart: on-failure

  policy-service:
    build: ./services/policy-service
    container_name: golfins-policy-service
    ports:
      - "8002:8000"
    volumes:
      - ./services/policy-service:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://golfins_user:golfins_pass@postgres:5432/golfins
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8000
      SERVICE_NAME: policy-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - golfins-network
    restart: on-failure

  premium-engine:
    build: ./services/premium-engine
    container_name: golfins-premium-engine
    ports:
      - "8003:8000"
    volumes:
      - ./services/premium-engine:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://golfins_user:golfins_pass@postgres:5432/golfins
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8000
      SERVICE_NAME: premium-engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - golfins-network
    restart: on-failure

  claims-service:
    build: ./services/claims-service
    container_name: golfins-claims-service
    ports:
      - "8004:8000"
    volumes:
      - ./services/claims-service:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://golfins_user:golfins_pass@postgres:5432/golfins
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SERVICE_NAME: claims-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - golfins-network
    restart: on-failure

  document-service:
    build: ./services/document-service
    container_name: golfins-document-service
    ports:
      - "8005:8000"
    volumes:
      - ./services/document-service:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://golfins_user:golfins_pass@postgres:5432/golfins
      REDIS_URL: redis://redis:6379/0
      MINIO_URL: http://minio:9000
      SERVICE_NAME: document-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - golfins-network
    restart: on-failure

  notification-service:
    build: ./services/notification-service
    container_name: golfins-notification-service
    ports:
      - "8007:8000"
    volumes:
      - ./services/notification-service:/app
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USER: test
      SMTP_PASSWORD: test
      SMTP_FROM_EMAIL: noreply@golfins.local
      SERVICE_NAME: notification-service
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - golfins-network
    restart: on-failure

  # ======== FRONTEND ========
  frontend:
    build: ./frontend
    container_name: golfins-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_APP_NAME: Golfins
    depends_on:
      - auth-service
      - policy-service
      - premium-engine
    networks:
      - golfins-network
    restart: on-failure

  # ======== REVERSE PROXY ========
  nginx:
    image: nginx:alpine
    container_name: golfins-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - auth-service
      - policy-service
      - premium-engine
      - claims-service
      - document-service
      - notification-service
    networks:
      - golfins-network
    restart: on-failure

# ======== VOLUMES ========
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local

# ======== NETWORKS ========
networks:
  golfins-network:
    driver: bridge
